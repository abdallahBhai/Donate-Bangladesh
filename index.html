<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donate Bangladesh</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>

</head>

<body class="bg-base-200">

<!-- NAVBAR -->
<div class="navbar bg-white shadow-md px-6 fixed top-0 left-0 w-full z-50">

<div class="flex-1">
<button class="btn btn-sm bg-lime-400 border-none text-black">Blog</button>
</div>

<div class="flex-1 justify-center flex items-center gap-2">
<span class="text-2xl">🪙</span>
<span class="font-semibold">Donate Bangladesh</span>
</div>

<div class="flex-1 flex justify-end items-center gap-2">
<span>Balance:</span>
<span id="balance" class="font-bold">5500</span> BDT
</div>

</div>


<div class="pt-28">

<!-- TABS -->
<div class="flex justify-center gap-4 mb-10">

<button onclick="showDonation()" class="btn bg-lime-400 border-none">
Donation
</button>

<button onclick="showHistory()" class="btn btn-outline">
History
</button>

</div>


<!-- DONATION SECTION -->
<div id="donation-section">

<div class="max-w-5xl mx-auto space-y-8">


<!-- CARD 1 -->
<div class="card lg:card-side bg-base-100 shadow-md border p-6 gap-6">

<figure class="w-full lg:w-1/2">
<img src="https://picsum.photos/500/300" class="rounded-lg object-cover w-full"/>
</figure>

<div class="flex flex-col justify-center w-full">

<div class="badge badge-outline w-fit mb-2">
🪙 <span id="card1-balance">0</span> BDT
</div>

<h2 class="font-bold text-lg mb-2">
Donate for Flood at Noakhali
</h2>

<input id="donation1" type="number"
placeholder="Write Donation Amount"
class="input input-bordered w-full mb-3">

<button
onclick="donate('donation1','card1-balance','Flood at Noakhali')"
class="btn bg-lime-400 border-none w-full">
Donate Now
</button>

</div>
</div>



<!-- CARD 2 -->
<div class="card lg:card-side bg-base-100 shadow-md border p-6 gap-6">

<figure class="w-full lg:w-1/2">
<img src="https://picsum.photos/501/300" class="rounded-lg object-cover w-full"/>
</figure>

<div class="flex flex-col justify-center w-full">

<div class="badge badge-outline w-fit mb-2">
🪙 <span id="card2-balance">600</span> BDT
</div>

<h2 class="font-bold text-lg mb-2">
Donate for Flood Relief in Feni
</h2>

<input id="donation2" type="number"
placeholder="Write Donation Amount"
class="input input-bordered w-full mb-3">

<button
onclick="donate('donation2','card2-balance','Flood Relief in Feni')"
class="btn bg-lime-400 border-none w-full">
Donate Now
</button>

</div>
</div>



<!-- CARD 3 -->
<div class="card lg:card-side bg-base-100 shadow-md border p-6 gap-6">

<figure class="w-full lg:w-1/2">
<img src="https://picsum.photos/502/300" class="rounded-lg object-cover w-full"/>
</figure>

<div class="flex flex-col justify-center w-full">

<div class="badge badge-outline w-fit mb-2">
🪙 <span id="card3-balance">2400</span> BDT
</div>

<h2 class="font-bold text-lg mb-2">
Aid for Injured in Quota Movement
</h2>

<input id="donation3" type="number"
placeholder="Write Donation Amount"
class="input input-bordered w-full mb-3">

<button
onclick="donate('donation3','card3-balance','Quota Movement Aid')"
class="btn bg-lime-400 border-none w-full">
Donate Now
</button>

</div>
</div>

</div>
</div>



<!-- HISTORY SECTION -->
<div id="history-section" class="hidden max-w-5xl mx-auto">

<div class="card bg-base-100 shadow p-6">

<h2 class="text-xl font-bold mb-4">
Donation History
</h2>

<ul id="history-list" class="space-y-2"></ul>

</div>

</div>


</div>



<!-- SUCCESS MODAL -->
<div id="successModal" class="modal">

<div class="modal-box text-center">

<h3 class="text-2xl font-bold mb-2">
Congrats!
</h3>

<div class="text-4xl mb-2">🪙</div>

<p class="text-gray-500">
You Have Donated for Humankind
</p>

<p class="font-semibold mb-4">
Successfully
</p>

<div class="modal-action justify-center">
<button onclick="closeModal()" class="btn">
Close Confirmation
</button>
</div>

</div>

</div>


<script src="index.js"></script>

</body>
</html>
